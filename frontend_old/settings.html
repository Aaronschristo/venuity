<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - PlayArea Manager</title>
    <link rel="icon" type="image/x-icon" href="img/favicon.ico">
    <link rel="icon" type="image/png" href="img/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://unpkg.com">
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        as="style" onload="this.onload=null;this.rel='stylesheet'">
    <link rel="preload" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" as="style"
        onload="this.onload=null;this.rel='stylesheet'">
    <noscript>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
            rel="stylesheet">
        <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    </noscript>
    <link rel="stylesheet" href="css/style.css?v=1.1">
    <script>
        if (localStorage.getItem('theme') !== 'light') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
        window.CURRENCY_SYMBOL = localStorage.getItem('currency_symbol') || '₹';
        const cachedName = localStorage.getItem('business_name') || 'PlayArea Manager';
        if (document.title.includes('PlayArea Manager')) {
            document.title = document.title.replace('PlayArea Manager', cachedName);
        }
    </script>
    <script src="js/config.js"></script>
    <script src="js/app.js?v=1.1" defer></script>
</head>

<body class="preload">
    <div class="app-container">
        <nav class="sidebar">
            <div class="logo-details">
                <img src="img/favicon.png" alt="Logo" class="logo-img">
                <span class="logo_name" id="sidebar-business-name"></span>
                <script>document.getElementById('sidebar-business-name').innerText = localStorage.getItem('business_name') || 'PlayArea Manager';</script>
            </div>
            <ul class="nav-links">
                <li><a href="index.html" id="nav-home"><i class='bx bx-home'></i><span
                            class="links_name">Home</span></a></li>
                <li><a href="dashboard.html" id="nav-dashboard"><i class='bx bx-grid-alt'></i><span
                            class="links_name">Dashboard</span></a></li>
                <li><a href="customers.html" id="nav-customers"><i class='bx bx-user'></i><span
                            class="links_name">Customers</span></a></li>
                <li><a href="recharge.html" id="nav-recharge"><i class='bx bx-wallet'></i><span
                            class="links_name">Recharge</span></a></li>
                <li><a href="scan.html" id="nav-scan"><i class='bx bx-qr-scan'></i><span
                            class="links_name">Check-in</span></a></li>
                <li><a href="analytics.html" id="nav-analytics"><i class='bx bx-bar-chart-alt-2'></i><span
                            class="links_name">Analytics</span></a></li>
                <li><a href="settings.html" id="nav-settings"><i class='bx bx-cog'></i><span
                            class="links_name">Settings</span></a></li>
            </ul>
        </nav>
        <script>
            if (window.innerWidth > 768 && localStorage.getItem('desktop_sidebar_state') === 'closed') {
                document.querySelector('.sidebar').classList.add('active');
            }
        </script>
        <section class="main-content">
            <nav class="topbar">
                <div class="sidebar-button">
                    <i class='bx bx-menu sidebarBtn'></i>
                    <span class="dashboard-title">Settings</span>
                </div>
                <div style="display:flex; align-items:center;">
                    <i class='bx bx-moon' style="cursor: pointer; font-size: 24px; color: var(--text-dark);"
                        onclick="toggleTheme()" id="theme-toggle-icon"></i>
                </div>
            </nav>
            <div class="content">

                <div class="flex-header">
                    <h2 style="margin: 0;">Application Settings</h2>
                </div>

                <div class="glass-card" style="max-width: 600px; margin: 0 auto;">
                    <form id="settings-form" onsubmit="handleSaveSettings(event)">
                        <div class="form-group">
                            <label for="business_name">Business Name</label>
                            <input type="text" id="business_name" class="form-input" value="PlayArea Manager" required>
                        </div>

                        <div class="form-group">
                            <label for="checkin_fee">Check-in Fee</label>
                            <input type="number" id="checkin_fee" class="form-input" value="100.0" step="any" min="0"
                                required>
                        </div>

                        <div class="form-group">
                            <label for="currency_symbol">Currency Symbol</label>
                            <input type="text" id="currency_symbol" class="form-input" value="₹" required>
                        </div>

                        <div style="margin-top: 30px;">
                            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">
                                <i class='bx bx-save'></i> Save Settings
                            </button>
                        </div>
                    </form>
                </div>

            </div>
        </section>
    </div>
    <div id="toast-container" class="toast-container"></div>
</body>

</html>
