<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - PlayArea Manager</title>
    <link rel="icon" type="image/x-icon" href="img/favicon.ico">
    <link rel="icon" type="image/png" href="img/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://unpkg.com">
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <link rel="preload" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
        <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    </noscript>
    <link rel="stylesheet" href="css/style.css?v=1.1">
    <script>
        if (localStorage.getItem('theme') !== 'light') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
        window.CURRENCY_SYMBOL = localStorage.getItem('currency_symbol') || '₹';
        const cachedName = localStorage.getItem('business_name') || 'PlayArea Manager';
        if (document.title.includes('PlayArea Manager')) {
            document.title = document.title.replace('PlayArea Manager', cachedName);
        }
    </script>
    <script src="js/config.js"></script>
    <script src="js/app.js?v=1.1" defer></script>
</head>
<body class="preload">
    <div class="app-container">
        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="logo-details">
                <img src="img/favicon.png" alt="Logo" class="logo-img">
                <span class="logo_name" id="sidebar-business-name"></span>
                <script>document.getElementById('sidebar-business-name').innerText = localStorage.getItem('business_name') || 'PlayArea Manager';</script>
            </div>
            <ul class="nav-links">
                <li><a href="index.html" id="nav-home"><i class='bx bx-home'></i><span class="links_name">Home</span></a></li>
                <li><a href="dashboard.html" id="nav-dashboard"><i class='bx bx-grid-alt'></i><span class="links_name">Dashboard</span></a></li>
                <li><a href="customers.html" id="nav-customers"><i class='bx bx-user'></i><span class="links_name">Customers</span></a></li>
                <li><a href="recharge.html" id="nav-recharge"><i class='bx bx-wallet'></i><span class="links_name">Recharge</span></a></li>
                <li><a href="scan.html" id="nav-scan"><i class='bx bx-qr-scan'></i><span class="links_name">Check-in</span></a></li>
                <li><a href="analytics.html" id="nav-analytics"><i class='bx bx-bar-chart-alt-2'></i><span class="links_name">Analytics</span></a></li>
                <li><a href="settings.html" id="nav-settings"><i class='bx bx-cog'></i><span class="links_name">Settings</span></a></li>
            </ul>
        </nav>
        <script>
            if (window.innerWidth > 768 && localStorage.getItem('desktop_sidebar_state') === 'closed') {
                document.querySelector('.sidebar').classList.add('active');
            }
        </script>
        <section class="main-content">
            <nav class="topbar">
                <div class="sidebar-button">
                    <i class='bx bx-menu sidebarBtn'></i>
                    <span class="dashboard-title">Dashboard</span>
                </div>
                <div style="display:flex; align-items:center;">
                    <i class='bx bx-moon' style="cursor: pointer; font-size: 24px; color: var(--text-dark);" onclick="toggleTheme()" id="theme-toggle-icon"></i>
                </div>
            </nav>
            <div class="content">

<div class="dashboard-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin-bottom: 30px;">
    <!-- Stats Cards -->
    <div class="glass-card stat-card" style="display: flex; align-items: center; justify-content: space-between;">
        <div>
            <h3 style="color: var(--text-light); font-size: 14px; text-transform: uppercase;">Total Customers</h3>
            <div id="total-customers" class="text-gradient" style="font-size: 36px; font-weight: 700; margin-top: 5px;">0</div>
        </div>
        <div style="background: rgba(99, 102, 241, 0.1); padding: 15px; border-radius: 12px; color: var(--primary-color);">
            <i class='bx bx-user' style="font-size: 32px;"></i>
        </div>
    </div>

    <div class="glass-card stat-card" style="display: flex; align-items: center; justify-content: space-between;">
        <div>
            <h3 style="color: var(--text-light); font-size: 14px; text-transform: uppercase;">Checkin Revenue</h3>
            <div class="text-gradient" style="font-size: 36px; font-weight: 700; margin-top: 5px;"><span id="revenue-symbol">₹</span><span id="total-revenue">0.00</span></div>
        </div>
        <div style="background: rgba(16, 185, 129, 0.1); padding: 15px; border-radius: 12px; color: var(--success);">
            <i class='bx bx-wallet-alt' style="font-size: 32px;"></i>
        </div>
    </div>
</div>

<div class="glass-card">
    <div class="flex-header dashboard-header" style="margin-bottom: 20px;">
        <h2 style="margin: 0;">Recent Transactions</h2>
        <div class="header-buttons">
            <button onclick="loadDashboardStats()" class="btn btn-amount dashboard-refresh-btn">
                <i class='bx bx-refresh'></i> <span class="hide-on-mobile">Refresh</span>
            </button>
        </div>
    </div>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Customer Name</th>
                    <th>Type</th>
                    <th>Amount</th>
                    <th>Date</th>
                </tr>
            </thead>
            <tbody id="transactions-table-body">
                <tr>
                    <td colspan="4" style="text-align: center; color: var(--text-light);">Loading...</td>
                </tr>
            </tbody>
        </table>
        <div id="loading-more-transactions" style="text-align: center; padding: 15px; color: var(--text-light); display: none;">
            <i class='bx bx-loader-alt bx-spin' style="font-size: 20px; vertical-align: middle;"></i> Loading older transactions...
        </div>
    </div>
</div>

            </div>
        </section>
    </div>
    <div id="toast-container" class="toast-container"></div>
</body>
</html>
