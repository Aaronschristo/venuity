<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - PlayArea Manager</title>
    <link rel="icon" type="image/x-icon" href="img/favicon.ico">
    <link rel="icon" type="image/png" href="img/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://unpkg.com">
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <link rel="preload" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
        <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    </noscript>
    <link rel="stylesheet" href="css/style.css?v=1.1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script>
        if (localStorage.getItem('theme') !== 'light') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
        window.CURRENCY_SYMBOL = localStorage.getItem('currency_symbol') || '₹';
        const cachedName = localStorage.getItem('business_name') || 'PlayArea Manager';
        if (document.title.includes('PlayArea Manager')) {
            document.title = document.title.replace('PlayArea Manager', cachedName);
        }
    </script>
    <script src="js/config.js"></script>
    <script src="js/app.js?v=1.1" defer></script>
</head>
<body class="preload">
    <div class="app-container">
        <nav class="sidebar">
            <div class="logo-details">
                <img src="img/favicon.png" alt="Logo" class="logo-img">
                <span class="logo_name" id="sidebar-business-name"></span>
                <script>document.getElementById('sidebar-business-name').innerText = localStorage.getItem('business_name') || 'PlayArea Manager';</script>
            </div>
            <ul class="nav-links">
                <li><a href="index.html" id="nav-home"><i class='bx bx-home'></i><span class="links_name">Home</span></a></li>
                <li><a href="dashboard.html" id="nav-dashboard"><i class='bx bx-grid-alt'></i><span class="links_name">Dashboard</span></a></li>
                <li><a href="customers.html" id="nav-customers"><i class='bx bx-user'></i><span class="links_name">Customers</span></a></li>
                <li><a href="recharge.html" id="nav-recharge"><i class='bx bx-wallet'></i><span class="links_name">Recharge</span></a></li>
                <li><a href="scan.html" id="nav-scan"><i class='bx bx-qr-scan'></i><span class="links_name">Check-in</span></a></li>
                <li><a href="analytics.html" id="nav-analytics"><i class='bx bx-bar-chart-alt-2'></i><span class="links_name">Analytics</span></a></li>
                <li><a href="settings.html" id="nav-settings"><i class='bx bx-cog'></i><span class="links_name">Settings</span></a></li>
            </ul>
        </nav>
        <script>
            if (window.innerWidth > 768 && localStorage.getItem('desktop_sidebar_state') === 'closed') {
                document.querySelector('.sidebar').classList.add('active');
            }
        </script>
        <section class="main-content">
            <nav class="topbar">
                <div class="sidebar-button">
                    <i class='bx bx-menu sidebarBtn'></i>
                    <span class="dashboard-title">Business Statistics</span>
                </div>
                <div style="display:flex; align-items:center;">
                    <i class='bx bx-moon' style="cursor: pointer; font-size: 24px; color: var(--text-dark);" onclick="toggleTheme()" id="theme-toggle-icon"></i>
                </div>
            </nav>
            <div class="content">

<div class="analytics-header">
    <button class="btn mobile-menu-btn" onclick="toggleAnalyticsMenu()">
        <i class='bx bx-slider-alt'></i> Chart Options
    </button>
    <div class="analytics-toggles-wrapper" id="analytics-toggles-menu">
        <div class="toggle-container metric-toggle revenue">
            <div class="toggle-bg"></div>
            <button class="toggle-btn" id="btn-metric-customers" onclick="switchMetric('customers')"><i class='bx bx-group'></i> Customers</button>
            <button class="toggle-btn active" id="btn-metric-revenue" onclick="switchMetric('revenue')"><i class='bx bx-coin-stack'></i> Revenue</button>
        </div>
        <div class="toggle-container chart-type-toggle line">
            <div class="toggle-bg"></div>
            <button class="toggle-btn" id="btn-bar" onclick="switchChartType('bar')"><i class='bx bx-bar-chart'></i> Bar</button>
            <button class="toggle-btn active" id="btn-line" onclick="switchChartType('line')"><i class='bx bx-line-chart'></i> Line</button>
        </div>
        <div class="toggle-container interval-toggle">
            <div class="toggle-bg"></div>
            <button class="toggle-btn active" id="btn-hourly" onclick="switchInterval('hourly')">Hourly</button>
            <button class="toggle-btn" id="btn-daily" onclick="switchInterval('daily')">Daily</button>
        </div>
    </div>
</div>

<div class="glass-card analytics-card">
    <div class="chart-header">
        <h2 class="chart-title">Check-in Revenue</h2>

        <div class="date-controls">
            <i class='bx bx-chevron-left date-nav-btn' onclick="shiftDate(-1)"></i>
            <span id="date-display">Loading...</span>
            <i class='bx bx-chevron-right date-nav-btn' onclick="shiftDate(1)"></i>
        </div>

        <div class="picker-container">
            <button id="aesthetic-date-picker" class="btn date-picker-btn">
                <i class='bx bx-calendar'></i> Pick Date
            </button>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="analyticsChart"></canvas>
    </div>
</div>

<style>
    .analytics-header { display: flex; justify-content: flex-end; margin-bottom: 20px; }
    .analytics-card { padding: 30px; }
    .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; flex-wrap: wrap; gap: 15px; }
    .chart-title { margin: 0; font-size: 20px; color: var(--text-dark); }
    .date-controls { display: flex; align-items: center; gap: 15px; }
    #date-display { font-weight: 500; color: var(--text-light); min-width: 180px; text-align: center; }
    .picker-container { position: relative; }
    .chart-container { position: relative; height: 400px; width: 100%; }
    .mobile-menu-btn { display: none; width: 100%; justify-content: center; background: var(--glass-bg); border: 1px solid var(--glass-border); color: var(--text-dark); margin-bottom: 15px; font-family: 'Poppins', sans-serif; font-weight: 600; padding: 12px; border-radius: 12px; gap: 8px; transition: background 0.3s ease; }
    [data-theme="dark"] .mobile-menu-btn { background: rgba(30, 41, 59, 0.5); }
    .mobile-menu-btn:hover { background: rgba(99, 102, 241, 0.1); }
    .analytics-toggles-wrapper { display: flex; gap: 15px; flex-wrap: wrap; justify-content: flex-end; }
    @media (max-width: 768px) {
        .mobile-menu-btn { display: flex; align-items: center; }
        .analytics-toggles-wrapper { display: none; flex-direction: column; width: 100%; gap: 10px; }
        .analytics-toggles-wrapper.show { display: flex; animation: slideDown 0.3s ease; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .analytics-header { flex-direction: column; align-items: center; margin-bottom: 15px; }
        .toggle-container { width: 100%; display: flex; }
        .toggle-btn { flex: 1; padding: 8px 10px; font-size: 13px; white-space: nowrap; }
        .analytics-card { padding: 20px 15px; }
        .chart-header { flex-direction: column; align-items: stretch; margin-bottom: 25px; gap: 18px; }
        .chart-title { text-align: center; }
        .date-controls { width: 100%; justify-content: space-between; background: rgba(99, 102, 241, 0.05); padding: 10px 20px; border-radius: 12px; border: 1px dashed rgba(99, 102, 241, 0.2); }
        [data-theme="dark"] .date-controls { background: rgba(255, 255, 255, 0.03); border: 1px dashed rgba(255, 255, 255, 0.1); }
        #date-display { min-width: unset; font-size: 14px; }
        .picker-container { width: 100%; }
        .date-picker-btn { width: 100%; justify-content: center; }
        .chart-container { height: 300px; }
    }
    .toggle-container { position: relative; display: inline-flex; background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: 12px; padding: 4px; box-shadow: var(--box-shadow); }
    [data-theme="dark"] .toggle-container { background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5); }
    .toggle-bg { position: absolute; top: 4px; bottom: 4px; left: 4px; width: calc(50% - 4px); background: var(--primary-color); border-radius: 8px; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 4px 8px rgba(99, 102, 241, 0.3); }
    [data-theme="dark"] .toggle-bg { background: linear-gradient(135deg, var(--primary-color), var(--primary-hover)); box-shadow: 0 4px 10px rgba(129, 140, 248, 0.4); }
    .toggle-container.daily .toggle-bg, .toggle-container.line .toggle-bg, .toggle-container.revenue .toggle-bg { transform: translateX(100%); }
    .toggle-btn { position: relative; z-index: 1; padding: 10px 30px; border: none; background: none; font-family: 'Poppins', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; color: var(--text-light); transition: color 0.3s ease; }
    .toggle-btn.active { color: white; }
    [data-theme="dark"] .toggle-btn.active { color: white; }
    .date-nav-btn { font-size: 20px; color: var(--text-light); cursor: pointer; transition: color 0.2s; }
    .date-nav-btn:hover { color: var(--primary-color); }
    .date-picker-btn { background: transparent; border: 2px solid var(--primary-color); color: var(--primary-color); font-weight: 700; font-size: 16px; padding: 8px 24px; border-radius: 12px; display: flex; align-items: center; gap: 10px; transition: all 0.3s ease; }
    .date-picker-btn i { font-size: 22px; }
    .date-picker-btn:hover { background: rgba(99, 102, 241, 0.1); }
    [data-theme="dark"] .date-picker-btn { background: rgba(15, 23, 42, 0.4); border-color: #818cf8; color: #818cf8; }
    /* Flatpickr glassmorphism */
    .flatpickr-calendar { background: var(--glass-bg) !important; backdrop-filter: blur(12px) !important; -webkit-backdrop-filter: blur(12px) !important; border: 1px solid var(--glass-border) !important; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1) !important; border-radius: 16px !important; font-family: 'Poppins', sans-serif !important; color: var(--text-dark) !important; }
    .flatpickr-calendar.arrowTop:before, .flatpickr-calendar.arrowTop:after, .flatpickr-calendar.arrowBottom:before, .flatpickr-calendar.arrowBottom:after { display: none !important; }
    .flatpickr-current-month { display: flex !important; align-items: center !important; justify-content: center !important; padding-top: 5px !important; gap: 5px !important; }
    .flatpickr-current-month input.cur-year { color: var(--text-dark) !important; font-weight: 700 !important; background: rgba(99, 102, 241, 0.1) !important; padding: 4px 8px !important; border-radius: 8px !important; transition: background 0.2s ease !important; }
    .flatpickr-current-month input.cur-year:hover, .flatpickr-current-month input.cur-year:focus { background: rgba(99, 102, 241, 0.2) !important; outline: none !important; }
    .flatpickr-current-month .flatpickr-monthDropdown-months { color: var(--text-dark) !important; font-weight: 700 !important; background: rgba(99, 102, 241, 0.1) !important; padding: 4px 12px !important; border-radius: 8px !important; border: none !important; appearance: none !important; -webkit-appearance: none !important; cursor: pointer !important; transition: background 0.2s ease !important; text-align: center !important; }
    .flatpickr-current-month .flatpickr-monthDropdown-months:hover { background: rgba(99, 102, 241, 0.2) !important; }
    .flatpickr-current-month .flatpickr-monthDropdown-months option { color: #000 !important; background: #fff !important; }
    [data-theme="dark"] .flatpickr-current-month .flatpickr-monthDropdown-months option { color: #fff !important; background: #1e293b !important; }
    span.flatpickr-weekday { color: var(--text-light) !important; font-weight: 600 !important; }
    .flatpickr-day { color: var(--text-dark) !important; border-radius: 8px !important; }
    .flatpickr-day:hover, .flatpickr-day:focus { background: rgba(99, 102, 241, 0.1) !important; border-color: transparent !important; color: var(--primary-color) !important; }
    .flatpickr-day.selected, .flatpickr-day.selected:hover, .flatpickr-day.selected:focus { background: var(--primary-color) !important; border-color: var(--primary-color) !important; color: white !important; }
    .flatpickr-day.flatpickr-disabled, .flatpickr-day.prevMonthDay, .flatpickr-day.nextMonthDay { color: var(--text-light) !important; opacity: 0.5 !important; }
</style>

<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js/dist/chart.umd.min.js" defer></script>
<script>
    let currentInterval = localStorage.getItem('analytics_interval') || 'hourly';
    let savedDate = localStorage.getItem('analytics_date');
    let currentChartType = localStorage.getItem('analytics_chart_type') || 'line';
    let currentMetric = localStorage.getItem('analytics_metric') || 'revenue';
    let currentDate = savedDate ? new Date(parseInt(savedDate)) : new Date();
    let analyticsChart = null;

    function initChart() {
        const ctx = document.getElementById('analyticsChart').getContext('2d');
        Chart.defaults.color = getComputedStyle(document.documentElement).getPropertyValue('--text-light').trim();
        Chart.defaults.font.family = "'Poppins', sans-serif";

        let datasetConfig = {
            label: currentMetric === 'revenue' ? `Revenue (${window.CURRENCY_SYMBOL || '₹'})` : 'Check-ins',
            data: [],
            backgroundColor: 'rgba(99, 102, 241, 0.2)',
            borderColor: 'rgba(99, 102, 241, 1)',
            borderWidth: 1,
            borderRadius: currentChartType === 'bar' ? 4 : 0,
            hoverBackgroundColor: 'rgba(99, 102, 241, 0.8)'
        };

        if (currentChartType === 'line') {
            datasetConfig.tension = 0.4;
            datasetConfig.fill = true;
            datasetConfig.backgroundColor = 'rgba(99, 102, 241, 0.1)';
            datasetConfig.borderWidth = 3;
            datasetConfig.pointBackgroundColor = 'rgba(99, 102, 241, 1)';
            datasetConfig.pointRadius = 4;
            datasetConfig.pointHoverRadius = 6;
        }

        analyticsChart = new Chart(ctx, {
            type: currentChartType,
            data: { labels: [], datasets: [datasetConfig] },
            options: {
                animation: { duration: 600 },
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: { backgroundColor: 'rgba(15, 23, 42, 0.9)', titleFont: { size: 13, family: 'Poppins' }, bodyFont: { size: 14, family: 'Poppins', weight: 'bold' }, padding: 12, cornerRadius: 8, displayColors: false }
                },
                scales: {
                    y: { beginAtZero: true, ticks: { precision: 0 }, grid: { color: function () { return document.documentElement.getAttribute('data-theme') === 'dark' ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)'; }, drawBorder: false } },
                    x: { grid: { display: false } }
                }
            }
        });
    }

    function formatDateForAPI(d) {
        const year = d.getFullYear();
        const month = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
    }

    function formatDisplayDate(dateStr, interval, endStr) {
        const d = new Date(dateStr + 'T00:00:00');
        const options = { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' };
        if (interval === 'hourly') {
            return d.toLocaleDateString(undefined, options);
        } else {
            const e = new Date(endStr + 'T00:00:00');
            const startShort = d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
            const endShort = e.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
            return `${startShort} - ${endShort}`;
        }
    }

    function fetchAnalytics() {
        const apiDate = formatDateForAPI(currentDate);
        fetch(`${window.APP_CONFIG.API_BASE}/api/analytics?interval=${currentInterval}&metric=${currentMetric}&date=${apiDate}`)
            .then(res => res.json())
            .then(data => {
                if (data.error) { console.error(data.error); return; }
                document.getElementById('date-display').innerText = formatDisplayDate(data.start, currentInterval, data.end);
                analyticsChart.data.labels = data.labels;
                analyticsChart.data.datasets[0].data = data.data;
                const gridColor = document.documentElement.getAttribute('data-theme') === 'dark' ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)';
                const textColor = getComputedStyle(document.documentElement).getPropertyValue('--text-light').trim();
                analyticsChart.options.scales.y.grid.color = gridColor;
                analyticsChart.options.scales.x.ticks.color = textColor;
                analyticsChart.options.scales.y.ticks.color = textColor;
                analyticsChart.update();
            });
    }

    function switchChartType(type) {
        if (currentChartType === type) return;
        currentChartType = type;
        localStorage.setItem('analytics_chart_type', type);
        const container = document.querySelector('.chart-type-toggle');
        document.getElementById('btn-bar').classList.remove('active');
        document.getElementById('btn-line').classList.remove('active');
        if (type === 'line') { container.classList.add('line'); document.getElementById('btn-line').classList.add('active'); }
        else { container.classList.remove('line'); document.getElementById('btn-bar').classList.add('active'); }
        if (analyticsChart) { analyticsChart.destroy(); initChart(); fetchAnalytics(); }
    }

    function switchMetric(metric) {
        if (currentMetric === metric) return;
        currentMetric = metric;
        localStorage.setItem('analytics_metric', metric);
        const container = document.querySelector('.metric-toggle');
        document.getElementById('btn-metric-customers').classList.remove('active');
        document.getElementById('btn-metric-revenue').classList.remove('active');
        if (metric === 'revenue') { container.classList.add('revenue'); document.getElementById('btn-metric-revenue').classList.add('active'); document.querySelector('.chart-title').innerText = 'Check-in Revenue'; }
        else { container.classList.remove('revenue'); document.getElementById('btn-metric-customers').classList.add('active'); document.querySelector('.chart-title').innerText = 'Number of Check-ins'; }
        if (analyticsChart) { analyticsChart.destroy(); initChart(); fetchAnalytics(); }
    }

    function switchInterval(interval) {
        if (currentInterval === interval) return;
        currentInterval = interval;
        localStorage.setItem('analytics_interval', interval);
        const container = document.querySelector('.interval-toggle');
        document.getElementById('btn-hourly').classList.remove('active');
        document.getElementById('btn-daily').classList.remove('active');
        if (interval === 'daily') { container.classList.add('daily'); document.getElementById('btn-daily').classList.add('active'); }
        else { container.classList.remove('daily'); document.getElementById('btn-hourly').classList.add('active'); }
        fetchAnalytics();
    }

    function shiftDate(direction) {
        if (currentInterval === 'hourly') { currentDate.setDate(currentDate.getDate() + direction); }
        else { currentDate.setDate(currentDate.getDate() + (direction * 7)); }
        localStorage.setItem('analytics_date', currentDate.getTime());
        fetchAnalytics();
    }

    const originalToggleTheme = window.toggleTheme;
    window.toggleTheme = function () {
        originalToggleTheme();
        setTimeout(() => {
            if (analyticsChart) {
                const gridColor = document.documentElement.getAttribute('data-theme') === 'dark' ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)';
                const textColor = getComputedStyle(document.documentElement).getPropertyValue('--text-light').trim();
                analyticsChart.options.scales.y.grid.color = gridColor;
                analyticsChart.options.scales.x.ticks.color = textColor;
                analyticsChart.options.scales.y.ticks.color = textColor;
                analyticsChart.update();
            }
        }, 10);
    }

    document.addEventListener("DOMContentLoaded", () => {
        if (currentInterval === 'daily') {
            const container = document.querySelector('.interval-toggle');
            document.getElementById('btn-hourly').classList.remove('active');
            document.getElementById('btn-daily').classList.add('active');
            container.classList.add('daily');
        }
        if (currentChartType === 'bar') {
            const containerType = document.querySelector('.chart-type-toggle');
            document.getElementById('btn-line').classList.remove('active');
            document.getElementById('btn-bar').classList.add('active');
            containerType.classList.remove('line');
        }
        if (currentMetric === 'customers') {
            const containerMetric = document.querySelector('.metric-toggle');
            document.getElementById('btn-metric-revenue').classList.remove('active');
            document.getElementById('btn-metric-customers').classList.add('active');
            containerMetric.classList.remove('revenue');
            document.querySelector('.chart-title').innerText = 'Number of Check-ins';
        }

        window.toggleAnalyticsMenu = function() {
            document.getElementById('analytics-toggles-menu').classList.toggle('show');
        };

        // Wait for chart.js and flatpickr to load (they are deferred)
        function waitForLibraries(callback) {
            if (typeof Chart !== 'undefined' && typeof flatpickr !== 'undefined') {
                callback();
            } else {
                setTimeout(() => waitForLibraries(callback), 100);
            }
        }

        waitForLibraries(() => {
            initChart();
            fetchAnalytics();
            flatpickr("#aesthetic-date-picker", {
                disableMobile: true,
                defaultDate: currentDate,
                onChange: function (selectedDates, dateStr, instance) {
                    if (selectedDates.length > 0) {
                        currentDate = selectedDates[0];
                        localStorage.setItem('analytics_date', currentDate.getTime());
                        fetchAnalytics();
                    }
                }
            });
        });
    });
</script>

            </div>
        </section>
    </div>
    <div id="toast-container" class="toast-container"></div>
</body>
</html>
