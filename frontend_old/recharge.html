<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recharge - PlayArea Manager</title>
    <link rel="icon" type="image/x-icon" href="img/favicon.ico">
    <link rel="icon" type="image/png" href="img/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://unpkg.com">
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <link rel="preload" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
        <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    </noscript>
    <link rel="stylesheet" href="css/style.css?v=1.1">
    <script>
        if (localStorage.getItem('theme') !== 'light') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
        window.CURRENCY_SYMBOL = localStorage.getItem('currency_symbol') || '₹';
        const cachedName = localStorage.getItem('business_name') || 'PlayArea Manager';
        if (document.title.includes('PlayArea Manager')) {
            document.title = document.title.replace('PlayArea Manager', cachedName);
        }
    </script>
    <script src="js/config.js"></script>
    <script src="js/app.js?v=1.1" defer></script>
</head>
<body class="preload">
    <div class="app-container">
        <nav class="sidebar">
            <div class="logo-details">
                <img src="img/favicon.png" alt="Logo" class="logo-img">
                <span class="logo_name" id="sidebar-business-name"></span>
                <script>document.getElementById('sidebar-business-name').innerText = localStorage.getItem('business_name') || 'PlayArea Manager';</script>
            </div>
            <ul class="nav-links">
                <li><a href="index.html" id="nav-home"><i class='bx bx-home'></i><span class="links_name">Home</span></a></li>
                <li><a href="dashboard.html" id="nav-dashboard"><i class='bx bx-grid-alt'></i><span class="links_name">Dashboard</span></a></li>
                <li><a href="customers.html" id="nav-customers"><i class='bx bx-user'></i><span class="links_name">Customers</span></a></li>
                <li><a href="recharge.html" id="nav-recharge"><i class='bx bx-wallet'></i><span class="links_name">Recharge</span></a></li>
                <li><a href="scan.html" id="nav-scan"><i class='bx bx-qr-scan'></i><span class="links_name">Check-in</span></a></li>
                <li><a href="analytics.html" id="nav-analytics"><i class='bx bx-bar-chart-alt-2'></i><span class="links_name">Analytics</span></a></li>
                <li><a href="settings.html" id="nav-settings"><i class='bx bx-cog'></i><span class="links_name">Settings</span></a></li>
            </ul>
        </nav>
        <script>
            if (window.innerWidth > 768 && localStorage.getItem('desktop_sidebar_state') === 'closed') {
                document.querySelector('.sidebar').classList.add('active');
            }
        </script>
        <section class="main-content">
            <nav class="topbar">
                <div class="sidebar-button">
                    <i class='bx bx-menu sidebarBtn'></i>
                    <span class="dashboard-title">Recharge Balance</span>
                </div>
                <div style="display:flex; align-items:center;">
                    <i class='bx bx-moon' style="cursor: pointer; font-size: 24px; color: var(--text-dark);" onclick="toggleTheme()" id="theme-toggle-icon"></i>
                </div>
            </nav>
            <div class="content">

<div class="glass-card" style="max-width: 900px; margin: 0 auto; padding: 30px;">
    <div style="display: flex; align-items: center; justify-content: center; margin-bottom: 20px;">
        <i class='bx bx-wallet' style="font-size: 48px; color: var(--success);"></i>
    </div>
    <h2 style="text-align: center; margin-bottom: 30px;">Top Up Balance</h2>

    <div class="recharge-grid">
        <!-- Scanner Column -->
        <div class="scanner-col">
            <div class="scanner-wrapper" style="max-width: 100%; border-radius: 12px; margin-bottom: 15px;">
                <div id="reader"></div>
                <div id="scanner-placeholder" class="scanner-overlay active">
                    <div class="overlay-content">
                        <div class="icon-circle primary">
                            <i class='bx bx-camera'></i>
                        </div>
                        <h3>Camera Inactive</h3>
                        <p>Start scanner to auto-fill Customer ID</p>
                    </div>
                </div>
                <div id="scanner-loading" class="scanner-overlay hidden">
                    <div class="overlay-content">
                        <i class='bx bx-loader-alt bx-spin loading-icon'></i>
                        <h3 id="loading-text">Initializing Camera...</h3>
                    </div>
                </div>
                <div id="scan-success-overlay" class="scanner-overlay success-overlay hidden">
                    <div class="overlay-content">
                        <div class="icon-circle success pulse">
                            <i class='bx bx-check'></i>
                        </div>
                        <h3>Scan Successful!</h3>
                    </div>
                </div>
            </div>

            <div class="scanner-controls"
                style="flex-direction: column; align-items: center; gap: 15px; margin-bottom: 25px;">
                <select id="camera-select" class="form-input"
                    style="max-width: 300px; margin-bottom: 15px; text-align: center; cursor: pointer; background: var(--glass-bg); color: var(--text-dark); border: 1px solid var(--glass-border);">
                    <option value="">Loading cameras...</option>
                </select>
                <button id="btn-toggle" type="button" class="btn btn-primary start-btn">
                    <i class='bx bx-play-circle'></i> Start Scanner
                </button>
            </div>
        </div>

        <!-- Form Column -->
        <div class="form-col" style="display: flex; flex-direction: column; justify-content: center;">
            <form id="recharge-form" onsubmit="handleRecharge(event)">
                <div class="form-group" style="position: relative;">
                    <label>Customer Name</label>
                    <input type="text" id="recharge-customer-name" class="form-input"
                        placeholder="Type name to search..." autocomplete="off">
                    <div id="customer-autocomplete-list"
                        style="position: absolute; width: 100%; max-height: 200px; overflow-y: auto; background: var(--white); border: 1px solid var(--glass-border); border-radius: 8px; z-index: 1000; box-shadow: var(--box-shadow); display: none;">
                    </div>
                </div>

                <div class="form-group">
                    <label>Customer ID</label>
                    <input type="text" id="recharge-customer-id" class="form-input"
                        placeholder="Enter or Scan Customer ID" required readonly>
                    <small style="color: var(--text-light); margin-top: 5px; display: block;">You can also scan the
                        customer's QR code to auto-fill this.</small>
                </div>

                <div class="form-group">
                    <label>Amount (<span class="currency-label">₹</span>)</label>
                    <div style="position: relative;">
                        <span id="recharge-currency-symbol"
                            style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); font-weight: 600;">₹</span>
                        <input type="number" id="recharge-amount" class="form-input" min="1" step="0.01"
                            style="padding-left: 30px;" required placeholder="0.00">
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 25px;">
                    <button type="button" class="btn btn-amount" id="quick-100"
                        onclick="document.getElementById('recharge-amount').value='100'">₹100</button>
                    <button type="button" class="btn btn-amount" id="quick-500"
                        onclick="document.getElementById('recharge-amount').value='500'">₹500</button>
                    <button type="button" class="btn btn-amount" id="quick-1000"
                        onclick="document.getElementById('recharge-amount').value='1000'">₹1000</button>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; font-size: 18px; padding: 15px;">
                    Confirm Recharge
                </button>
            </form>
        </div>
    </div>
</div>

<!-- html5-qrcode library -->
<script src="js/html5-qrcode.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        const html5QrCode = new Html5Qrcode("reader");
        let isProcessing = false;
        let isCameraActive = false;

        const btnToggle = document.getElementById("btn-toggle");
        const cameraSelect = document.getElementById("camera-select");
        const overlayPlaceholder = document.getElementById("scanner-placeholder");
        const overlayLoading = document.getElementById("scanner-loading");
        const overlaySuccess = document.getElementById("scan-success-overlay");
        const loadingText = document.getElementById("loading-text");

        function hideAllOverlays() {
            overlayPlaceholder.classList.add("hidden");
            overlayPlaceholder.classList.remove("active");
            overlayLoading.classList.add("hidden");
            overlaySuccess.classList.add("hidden");
        }

        function showLoading(text) {
            hideAllOverlays();
            loadingText.innerText = text || "Processing...";
            overlayLoading.classList.remove("hidden");
        }

        function showPlaceholder() {
            hideAllOverlays();
            overlayPlaceholder.classList.add("active");
            overlayPlaceholder.classList.remove("hidden");
        }

        Html5Qrcode.getCameras().then(devices => {
            if (devices && devices.length) {
                cameraSelect.innerHTML = "";
                devices.forEach(camera => {
                    const option = document.createElement("option");
                    option.value = camera.id;
                    option.text = camera.label || `Camera ${cameraSelect.length + 1}`;
                    cameraSelect.appendChild(option);
                });
            } else {
                cameraSelect.innerHTML = "<option value=''>No cameras found</option>";
            }
        }).catch(err => {
            cameraSelect.innerHTML = "<option value=''>Camera access denied</option>";
        });

        function startScanner(cameraId) {
            showLoading('Initializing Camera...');
            const config = { fps: 15, qrbox: { width: 250, height: 250 }, aspectRatio: 1.0, formatsToSupport: [Html5QrcodeSupportedFormats.QR_CODE] };
            html5QrCode.start(cameraId, config, onScanSuccess)
                .then(() => {
                    isCameraActive = true;
                    hideAllOverlays();
                    btnToggle.innerHTML = "<i class='bx bx-stop-circle'></i> Stop Scanner";
                    btnToggle.classList.remove("btn-primary", "start-btn");
                    btnToggle.classList.add("stop-btn");
                    cameraSelect.disabled = true;
                })
                .catch((err) => {
                    console.error(err);
                    showPlaceholder();
                    showToast('Failed to start camera. Check permissions.', 'error');
                });
        }

        function stopScanner() {
            if (isCameraActive) {
                html5QrCode.stop().then(() => {
                    isCameraActive = false;
                    showPlaceholder();
                    btnToggle.innerHTML = "<i class='bx bx-play-circle'></i> Start Scanner";
                    btnToggle.classList.add("btn-primary", "start-btn");
                    btnToggle.classList.remove("stop-btn");
                    cameraSelect.disabled = false;
                }).catch(err => { console.error("Failed to stop camera", err); });
            }
        }

        btnToggle.addEventListener("click", () => {
            if (isCameraActive) stopScanner();
            else { const cameraId = cameraSelect.value; if (cameraId) startScanner(cameraId); }
        });

        function onScanSuccess(decodedText) {
            if (isProcessing) return;
            isProcessing = true;
            if (html5QrCode.pause) { try { html5QrCode.pause(); } catch (e) { } }
            document.getElementById('recharge-customer-id').value = decodedText;
            hideAllOverlays();
            overlaySuccess.classList.remove("hidden");
            showToast("QR Scanned successfully!", "success");
            setTimeout(() => {
                stopScanner();
                hideAllOverlays();
                showPlaceholder();
                isProcessing = false;
            }, 1500);
        }
    });
</script>

<style>
    .recharge-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: center; }
    @media (max-width: 768px) { .recharge-grid { grid-template-columns: 1fr; gap: 20px; align-items: start; } }
    .scanner-wrapper { position: relative; width: 100%; max-width: 450px; margin: 0 auto; border-radius: 20px; overflow: hidden; background: #000; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1), 0 0 0 2px rgba(255, 255, 255, 0.2); aspect-ratio: 1/1; z-index: 1; }
    #reader { width: 100%; height: 100%; border: none !important; }
    #reader video { object-fit: cover !important; border-radius: 20px; }
    .scanner-overlay { position: absolute; inset: 0; border-radius: 20px; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 10; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
    .scanner-overlay:not(.hidden) { opacity: 1; pointer-events: auto; }
    .scanner-overlay.active { opacity: 1; pointer-events: auto; }
    .overlay-content { text-align: center; color: #fff; padding: 20px; }
    .overlay-content h3 { font-size: 20px; margin-bottom: 8px; font-weight: 600; }
    .overlay-content p { color: #cbd5e1; font-size: 14px; max-width: 280px; margin: 0 auto; }
    .loading-icon { font-size: 40px; color: var(--primary-color); margin-bottom: 15px; }
    .icon-circle { width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px auto; font-size: 32px; }
    .icon-circle.primary { background: rgba(99, 102, 241, 0.2); color: #818cf8; border: 2px solid rgba(99, 102, 241, 0.4); }
    .icon-circle.success { background: rgba(16, 185, 129, 0.2); color: #34d399; border: 2px solid rgba(16, 185, 129, 0.4); }
    .scanner-controls .btn { padding: 12px 20px; border-radius: 30px; font-weight: 500; display: flex; align-items: center; gap: 15px; }
    .stop-btn { background: #fee2e2; color: #ef4444; }
    .stop-btn:hover { background: #fecaca; }
    [data-theme="dark"] .stop-btn { background: rgba(239, 68, 68, 0.15); }
    @keyframes pulse-success { 0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(16, 185, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }
    .pulse { animation: pulse-success 2s infinite; }
</style>

            </div>
        </section>
    </div>
    <div id="toast-container" class="toast-container"></div>
</body>
</html>
