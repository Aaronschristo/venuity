language: "en-US"
reviews:
  profile: "software-engineer"
  request_changes_workflow: false
  high_level_summary: true
  poetry_tools: false
  routing:
    - path: "backend/**"
      instructions: "Ensure Django views use DRF standards. Check for missing authentication or permission decorators. Suggest optimizations using Pandas for data export if needed."
    - path: "frontend/**"
      instructions: "Check React components for prop-types or TypeScript interfaces. Ensure Tailwind or CSS modules are used effectively. Flag any memory leaks especially around the Html5Qrcode scanner hook."
    - path: "src-tauri/**"
      instructions: "Ensure Rust code handles errors gracefully without panicking using anyhow or thiserror crates."
chat:
  auto_reply: true
